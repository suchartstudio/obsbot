<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSBOT Controller</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1e1e1e; color: white; margin-top: 50px; }
        .control-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; justify-content: center; margin-top: 20px; user-select: none; }
        button { padding: 20px; font-size: 20px; cursor: pointer; border: none; border-radius: 10px; background-color: #3a3a3a; color: white; transition: 0.2s; }
        button:hover { background-color: #555; }
        button:active { background-color: #007bff; }
        .empty { visibility: hidden; }
        #status { margin-bottom: 20px; padding: 10px; border-radius: 5px; display: inline-block; background-color: #dc3545; }
    </style>
</head>
<body>

    <h2>OBSBOT Tiny 2 Web Control</h2>
    <div id="status">🔴 ยังไม่ได้เชื่อมต่อกับ Local Bridge</div>

    <div class="control-pad">
        <div class="empty"></div>
        <button 
            onmousedown="sendOsc('/OBSBOT/WebCam/General/MoveUp', [1])" 
            onmouseup="sendOsc('/OBSBOT/WebCam/General/MoveUp', [0])"
            onmouseleave="sendOsc('/OBSBOT/WebCam/General/MoveUp', [0])">⬆️</button>
        <div class="empty"></div>
        
        <button 
            onmousedown="sendOsc('/OBSBOT/WebCam/General/MoveLeft', [1])" 
            onmouseup="sendOsc('/OBSBOT/WebCam/General/MoveLeft', [0])"
            onmouseleave="sendOsc('/OBSBOT/WebCam/General/MoveLeft', [0])">⬅️</button>
            
        <button onclick="sendOsc('/OBSBOT/WebCam/General/ResetGimbal', [1])">🔄</button>
        
        <button 
            onmousedown="sendOsc('/OBSBOT/WebCam/General/MoveRight', [1])" 
            onmouseup="sendOsc('/OBSBOT/WebCam/General/MoveRight', [0])"
            onmouseleave="sendOsc('/OBSBOT/WebCam/General/MoveRight', [0])">➡️</button>
            
        <div class="empty"></div>
        <button 
            onmousedown="sendOsc('/OBSBOT/WebCam/General/MoveDown', [1])" 
            onmouseup="sendOsc('/OBSBOT/WebCam/General/MoveDown', [0])"
            onmouseleave="sendOsc('/OBSBOT/WebCam/General/MoveDown', [0])">⬇️</button>
        <div class="empty"></div>
    </div>

    <script>
        let ws;
        const statusEl = document.getElementById('status');

        function connect() {
            ws = new WebSocket('ws://localhost:8080');

            ws.onopen = () => {
                statusEl.innerHTML = '🟢 เชื่อมต่อ Local Bridge สำเร็จ';
                statusEl.style.backgroundColor = '#28a745';
            };

            ws.onclose = () => {
                statusEl.innerHTML = '🔴 ขาดการเชื่อมต่อ (กำลังพยายามใหม่...)';
                statusEl.style.backgroundColor = '#dc3545';
                setTimeout(connect, 3000); 
            };

            ws.onerror = (err) => console.error('WebSocket Error:', err);
        }

        function sendOsc(address, args) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const payload = JSON.stringify({ address: address, args: args });
                ws.send(payload);
                console.log('Sent:', payload);
            }
        }

        connect();
    </script>
</body>
</html>
